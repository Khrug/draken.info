<!-- Sheaf Game v2.1: Full-width layout, readable text -->
<!-- Drop this file into static/pages/sheaf-game.html -->
<!-- The build-patch.js wraps it in the base template -->

<style>
.sg{font-family:Inter,'Helvetica Neue',sans-serif;max-width:1400px;margin:0 auto;padding:20px 24px;color:#e6edf3}
.sg h2{font-size:32px;font-weight:700;color:#fff;margin:8px 0}
.sg-sub{font-size:16px;color:#8b949e;max-width:700px;margin:0 auto;line-height:1.5}
.sg-btns{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0}
.sg-b{padding:8px 16px;border-radius:6px;border:1px solid #30363d;background:#161b22;color:#8b949e;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s}
.sg-b:hover{border-color:#484f58;color:#c9d1d9}
.sg-b.on{border-color:#e94560;background:#e9456018;color:#fff}
.sg-flex{display:flex;gap:24px;flex-wrap:wrap}
.sg-l{flex:1 1 480px;min-width:360px}
.sg-r{flex:1 1 420px;min-width:340px}
.sg-c{background:#161b22;border-radius:10px;padding:20px;margin-bottom:14px}
.sg-ly{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;margin:2px 0;transition:background .1s}
.sg-ly:hover{background:rgba(255,255,255,.04)}
.sg-lid{font-size:14px;font-weight:700;width:64px;flex-shrink:0}
.sg-ln{font-size:14px;color:#8b949e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sg-lb{width:80px;height:14px;background:#21262d;border-radius:4px;overflow:hidden;flex-shrink:0}
.sg-lf{height:100%;border-radius:4px;transition:width .4s}
.sg-lv{font-size:13px;font-weight:600;width:40px;text-align:right;flex-shrink:0}
.sg-ml{font-size:11px;padding:2px 0 2px 74px;font-weight:600}
.sg-mv{font-size:36px;font-weight:700}
.sg-ml2{font-size:14px;color:#8b949e}
.sg-mr{display:flex;gap:28px;justify-content:center;margin-top:16px}
.sg-mr>div{text-align:center}
.sg-mr .v{font-size:22px;font-weight:700}
.sg-mr .l{font-size:12px;color:#8b949e}
.sg-sn{font-size:18px;font-weight:700;color:#fff;margin-bottom:4px}
.sg-sf{font-size:13px;font-weight:600;color:#e94560;margin-bottom:10px}
.sg-so{font-size:14px;color:#c9d1d9;line-height:1.7;margin-bottom:12px}
.sg-fx{border-left:3px solid #30363d;padding:8px 14px;margin-bottom:6px;background:#0d111780;border-radius:0 6px 6px 0}
.sg-fx.a{border-color:#e94560}.sg-fx.w{border-color:#f59e0b}.sg-fx.o{border-color:#2d8659}
.sg-fl{font-size:12px;font-weight:600;margin-bottom:2px}
.sg-ft{font-size:14px;color:#c9d1d9;line-height:1.5}
.sg-rw{font-size:13px;color:#8b949e;border-top:1px solid #21262d;padding-top:10px;margin-top:8px;line-height:1.5}
.sg-kd{font-size:13px;margin-top:6px}
.sg-sr{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sg-sr label{font-size:12px;color:#8b949e;width:100px;flex-shrink:0}
.sg-sr input[type=range]{flex:1;height:5px}
.sg-sr span{font-size:12px;font-weight:600;width:36px;text-align:right}
</style>

<div class="sg" id="sg-app">
  <div style="text-align:center;padding:20px 0 14px">
    <div style="font-size:13px;color:#e94560;letter-spacing:4px;font-weight:700">DRAKEN 2045 — INTERACTIVE PEDAGOGY</div>
    <h2>The Sheaf Game: Failure Modes</h2>
    <p class="sg-sub">How layered agents build world-models — and exactly what breaks when the gluing fails</p>
  </div>
  <div class="sg-btns" id="sg-btns"></div>
  <div class="sg-flex">
    <div class="sg-l" id="sg-left"></div>
    <div class="sg-r" id="sg-right"></div>
  </div>
  <div style="text-align:center;font-size:13px;color:#555;padding:20px;margin-top:14px;background:#161b22;border-radius:10px">
    <strong style="color:#8b949e">The Sheaf Game</strong> — Interactive pedagogy for the <a href="/" style="color:#e94560;text-decoration:none">Draken 2045 Framework</a><br>
    <a href="/" style="color:#e94560;text-decoration:none">← Feed</a> · <a href="/thesis/" style="color:#e94560;text-decoration:none">Thesis</a>
  </div>
</div>

<script>
// Sheaf Game v2.1 — Vanilla JS (full-width, readable)
(function() {
  var LAYERS = [
    {n:"Molecules",e:"\u{1f9ec}",c:"#1565C0",d:"Chemical agents exchanging energy via thermodynamic gradients",wm:"Thermodynamic gradients"},
    {n:"Cells",e:"\u{1f52c}",c:"#2E7D32",d:"Bioelectric agents exchanging voltage signals (Levin)",wm:"Bioelectric voltage map"},
    {n:"Organs",e:"\u{1fac0}",c:"#388E3C",d:"Tissue systems coordinating function",wm:"Homeostatic set-points"},
    {n:"Brain",e:"\u{1f9e0}",c:"#F57F17",d:"Neural populations integrating sensation",wm:"Sensory/predictive map"},
    {n:"Narrative Self",e:"\u{1f4ad}",c:"#E65100",d:"The 'I' that narrates experience",wm:"Self-model"},
    {n:"Social Self",e:"\u{1f91d}",c:"#AD1457",d:"Reputation, roles, relationships",wm:"Social map"},
    {n:"Group Mind",e:"\u{1f465}",c:"#6A1B9A",d:"Shared beliefs, tribal knowledge",wm:"Group narrative"},
    {n:"Institution",e:"\u{1f3db}\ufe0f",c:"#283593",d:"Organizations, markets, governments",wm:"Institutional model"}
  ];

  var SCENARIOS = [
    {name:"\u{1f7e2} Healthy Organism",a:[.95,.93,.90,.88,.85,.82,.80,.78],fail:"None",out:"All restriction maps intact. Corrections flow freely. High \u0393, low \u03a8, K(t) \u2248 0.",fx:[{l:"All",t:"Information flows bidirectionally",s:"o"},{l:"L04\u2192L05",t:"Bioelectric signals reach neural integration",s:"o"}],rw:"Well-functioning small team. Rare at civilizational scale.",kd:"\u2248 0"},
    {name:"\u{1f7e1} Corporate Disconnect",a:[.95,.93,.90,.88,.85,.50,.35,.20],fail:"L08\u219bL09\u219bL10 \u2014 executive detaches from operational reality",out:"Three truths: Official (board deck), Operational (engineering standup), Real (exit interviews). Finance sees growth while HR sees 40% attrition.",fx:[{l:"L07\u2013L08",t:"Individual cognition fine \u2014 people know something is wrong",s:"o"},{l:"L08\u2192L09",t:"DEGRADED \u2014 warnings don't reach group decisions",s:"w"},{l:"L09\u2192L10",t:"SEVERED \u2014 engineering says '6 months to collapse'; board says 'record quarter'",s:"a"},{l:"L10",t:"SELF-SEALING \u2014 disconfirming data = 'negativity'",s:"a"}],rw:"Boeing 2018\u20132024, WeWork 2019, Enron 2001",kd:"HIGH \u2014 each quarter inscribes divergence deeper"},
    {name:"\u{1f534} Psychotic Break",a:[.95,.93,.90,.30,.10,.15,.12,.08],fail:"L05\u219bL07 \u2014 narrative self detaches from senses",out:"Body works but narrative self has detached from sensory map. Every correction reinterpreted as confirmation. Same structure as institutional psychosis at L12.",fx:[{l:"L01\u2013L04",t:"Normal \u2014 molecular/cellular function continues",s:"o"},{l:"L05\u2192L07",t:"SEVERED \u2014 narrative no longer updates from senses",s:"a"},{l:"L07",t:"SELF-SEALING \u2014 generates own evidence",s:"a"},{l:"L08\u2013L10",t:"CASCADING \u2014 all social participation degrades",s:"a"}],rw:"Schizophrenic episode (L07). Cult (L09). Self-referential national media (L12).",kd:"CRITICAL \u2014 daily damage to relationships, employment, health"},
    {name:"\u{1f7e0} Burnout / Dissociation",a:[.90,.85,.50,.45,.80,.85,.82,.75],fail:"L04\u219bL06 \u2014 body screams, mind overrides",out:"Mind works, social self functional. But body screaming \u2014 chronic pain, exhaustion, insomnia. Narrative says 'push through' while organs say 'stop.'",fx:[{l:"L01\u2013L03",t:"Stress markers elevated (cortisol, inflammation)",s:"w"},{l:"L04",t:"Organ distress \u2014 heart rate, gut, sleep disruption",s:"w"},{l:"L04\u2192L06",t:"SEVERED \u2014 somatic signals overridden ('I'm fine')",s:"a"},{l:"L07\u2013L10",t:"Apparently normal \u2014 person keeps performing",s:"o"},{l:"Hidden K(t)",t:"ACCUMULATING SILENTLY \u2014 biological damage partially irreversible",s:"a"}],rw:"Han's Burnout Society. Silicon Valley burnout. Japan karoshi.",kd:"HIDDEN but compounding"},
    {name:"\u{1f7e3} Echo Chamber",a:[.95,.93,.90,.88,.85,.80,.15,.25],fail:"L09 self-sealing \u2014 group immune to external signal",out:"Everything below group level works. But at L09, belief system has closed. Only confirming info processed. All contradiction = 'enemy propaganda.'",fx:[{l:"L07\u2013L08",t:"Individual cognition functional",s:"o"},{l:"L08\u2192L09",t:"CAPTURED \u2014 friendship = loyalty test",s:"w"},{l:"L09",t:"SELF-SEALING \u2014 \u03a8_group \u2192 \u221e",s:"a"},{l:"L09\u2192L10",t:"SEVERED \u2014 science, law rejected as 'elite deception'",s:"a"}],rw:"QAnon. Anti-vax. Academic silos. Cult dynamics.",kd:"MODERATE but virulent"},
    {name:"\u{1f535} Manufactured Void",a:[.95,.93,.90,.88,.85,.80,.70,.15],fail:"L10\u219bL07 \u2014 institutions sever from lived experience, \u03bd \u2192 1",out:"People know something is wrong but lack structural explanation. Void filled by whatever narrative acknowledges the symptom while misdirecting the cause.",fx:[{l:"L07\u2013L09",t:"Functional but ANXIOUS",s:"w"},{l:"L09",t:"VULNERABLE \u2014 high \u03bd = demand for explanatory narratives",s:"w"},{l:"L10",t:"SELF-REFERENTIAL \u2014 KPIs detached from purpose",s:"a"},{l:"Void-filling",t:"PARASITIC \u2014 algorithms exploit meaning-demand",s:"a"}],rw:"DRK-110: Fairness Doctrine \u2192 Southern Strategy \u2192 2008 \u2192 2016",kd:"VERY HIGH \u2014 load-bearing decisions under severance"},
    {name:"\u26ab Civilizational Psychosis",a:[.95,.90,.85,.80,.75,.45,.25,.10],fail:"Multi-interface cascade",out:"Locally coherent everywhere, globally coherent nowhere. Cannot collectively perceive threats because no shared signal space exists.",fx:[{l:"L01\u2013L06",t:"Normal \u2014 individual biology/cognition continues",s:"o"},{l:"L07",t:"FRAGMENTED \u2014 private realities from curated feeds",s:"w"},{l:"L08\u2192L09",t:"SEVERED \u2014 bonds = tribal markers, not reality-testing",s:"a"},{l:"L09\u2192L10",t:"SEVERED \u2014 mutual rejection",s:"a"},{l:"L14\u2192L04",t:"SEVERED \u2014 economics without ecological feedback",s:"a"},{l:"Global \u03a8",t:"\u03a8 \u2192 \u221e at civilizational scale",s:"a"}],rw:"Current trajectory (DRK-110, DRK-119, DRK-121). Fragility diagnosis.",kd:"MAXIMUM \u2014 decades, multiple interfaces, high w(\u03c4)"},
    {name:"\u{1fa79} Repair in Progress",a:[.95,.93,.90,.88,.85,.70,.55,.45],fail:"Partial recovery",out:"Gradual restriction map restoration. Cross-functional transparency, citizen assemblies. K(t) still high but dK/dt has turned negative for the first time.",fx:[{l:"L08\u2192L09",t:"IMPROVING \u2014 small-group deliberation rebuilds bridge",s:"o"},{l:"L09\u2192L10",t:"IMPROVING \u2014 participatory budgeting restores map",s:"o"},{l:"L10",t:"PARTIALLY RESTORED \u2014 some metrics reconnected to purpose",s:"w"},{l:"K(t)",t:"dK/dt < 0 \u2014 repair rate > new debt",s:"o"}],rw:"Taiwan vTaiwan. Iceland post-2008. Community land trusts.",kd:"Elevated but DECLINING"}
  ];

  var cur = 0, editing = false, aligns = SCENARIOS[0].a.slice(), selL = null;

  function g(){ return aligns.reduce(function(s,a){return s+a},0)/aligns.length; }
  function ps(){ var v=g(); return v>0.01 ? ((1-v)/v).toFixed(2) : "\u221e"; }
  function kd(){ return Math.max(0,(1-g())-0.15)*10; }
  function bc(v){ return v>.7?"#2d8659":v>.4?"#f59e0b":"#e94560"; }
  function ms(i){ return Math.min(aligns[i],aligns[i+1]); }
  function mst(i){ var s=ms(i); return s<.35?"\u2717 SEVERED":s<.5?"\u26a0 DEGRADED":"\u2713"; }
  function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function render() {
    var sc = SCENARIOS[cur];
    // Buttons
    var b = '';
    for (var i=0; i<SCENARIOS.length; i++) {
      b += '<button class="sg-b'+(i===cur?' on':'')+'" onclick="SG.set('+i+')">'+esc(SCENARIOS[i].name)+'</button>';
    }
    b += '<button class="sg-b'+(editing?' on':'')+'" style="border-color:'+(editing?'#2d8659':'#30363d')+';color:'+(editing?'#2d8659':'#8b949e')+'" onclick="SG.te()">\u{1f527} '+(editing?'Editing':'Edit Maps')+'</button>';
    document.getElementById('sg-btns').innerHTML = b;

    // Left: layers
    var h = '';
    for (var i=0; i<LAYERS.length; i++) {
      var l=LAYERS[i], a=aligns[i], c=bc(a);
      h += '<div class="sg-ly" onclick="SG.sl('+i+')" style="'+(selL===i?'background:'+l.c+'18':'')+'">';
      h += '<span class="sg-lid" style="color:'+l.c+'">'+l.e+' L'+String(i+1).padStart(2,'0')+'</span>';
      h += '<span class="sg-ln">'+esc(l.n)+'</span>';
      h += '<div class="sg-lb"><div class="sg-lf" style="width:'+a*100+'%;background:'+c+'"></div></div>';
      h += '<span class="sg-lv" style="color:'+c+'">'+a.toFixed(2)+'</span></div>';
      if (i < 7) {
        var mc = bc(ms(i));
        h += '<div class="sg-ml" style="color:'+mc+'">\u03c1'+(i+1)+','+(i+2)+' '+mst(i)+'</div>';
      }
    }
    if (editing) {
      h += '<div style="background:#161b22;border-radius:10px;padding:16px;margin-top:12px"><div style="font-size:14px;font-weight:600;color:#2d8659;margin-bottom:10px">\u{1f527} Drag to break or repair</div>';
      for (var i=0; i<LAYERS.length; i++) {
        h += '<div class="sg-sr"><label>'+LAYERS[i].e+' '+esc(LAYERS[i].n)+'</label><input type="range" min="0" max="100" value="'+Math.round(aligns[i]*100)+'" oninput="SG.sd('+i+',this.value)" style="accent-color:'+LAYERS[i].c+'"><span style="color:'+bc(aligns[i])+'">'+aligns[i].toFixed(2)+'</span></div>';
      }
      h += '</div>';
    }
    document.getElementById('sg-left').innerHTML = h;

    // Right: info
    var gv=g(), pv=ps(), kv=kd(), gc=bc(gv);
    var r = '';
    // Metrics
    r += '<div class="sg-c" style="text-align:center"><div class="sg-mv" style="color:'+gc+'">'+gv.toFixed(3)+'</div><div class="sg-ml2">GLOBAL \u0393 \u2014 '+(gv>.7?'COHERENT':gv>.4?'DEGRADED':'INCOHERENT')+'</div>';
    r += '<div class="sg-mr"><div><div class="v" style="color:'+(parseFloat(pv)>1?'#e94560':'#2d8659')+'">'+pv+'</div><div class="l">\u03a8 psychosis</div></div>';
    r += '<div><div class="v" style="color:'+(kv>5?'#e94560':kv>2?'#f59e0b':'#2d8659')+'">'+kv.toFixed(1)+'</div><div class="l">K(t) debt</div></div>';
    var sev = 0; for(var i=0;i<7;i++) if(ms(i)<.35) sev++;
    r += '<div><div class="v" style="color:'+(sev>0?'#e94560':'#2d8659')+'">'+sev+'/7</div><div class="l">Severed</div></div></div></div>';

    // Scenario detail
    r += '<div class="sg-c" style="border-left:3px solid '+gc+'"><div class="sg-sn">'+esc(sc.name)+'</div>';
    r += '<div class="sg-sf">Failure: '+esc(sc.fail)+'</div>';
    r += '<div class="sg-so">'+esc(sc.out)+'</div>';
    for (var j=0; j<sc.fx.length; j++) {
      var f=sc.fx[j], fc=f.s==='a'?'a':f.s==='w'?'w':'o';
      var fcc=f.s==='a'?'#e94560':f.s==='w'?'#f59e0b':'#2d8659';
      r += '<div class="sg-fx '+fc+'"><div class="sg-fl" style="color:'+fcc+'">'+esc(f.l)+'</div><div class="sg-ft">'+esc(f.t)+'</div></div>';
    }
    r += '<div class="sg-rw"><b style="color:#f59e0b">Real-world:</b> '+esc(sc.rw)+'</div>';
    r += '<div class="sg-kd" style="color:'+(kv>5?'#e94560':'#8b949e')+'"><b>K(t):</b> '+esc(sc.kd)+'</div></div>';

    // Selected layer
    if (selL !== null) {
      var sl=LAYERS[selL], sa=aligns[selL];
      r += '<div class="sg-c" style="border-left:3px solid '+sl.c+'">';
      r += '<div style="font-size:16px;font-weight:600;color:'+sl.c+'">'+sl.e+' '+esc(sl.n)+'</div>';
      r += '<div style="font-size:14px;color:#8b949e;margin:4px 0">'+esc(sl.d)+'</div>';
      r += '<div style="font-size:14px;color:#c9d1d9"><b>World-model:</b> '+esc(sl.wm)+'</div>';
      r += '<div style="font-size:14px;font-weight:600;color:'+bc(sa)+';margin-top:6px">Local \u0393 = '+sa.toFixed(2)+(sa<.35?' \u26a0\ufe0f SEVERED':sa<.5?' \u26a0 DEGRADED':'')+'</div></div>';
    }

    document.getElementById('sg-right').innerHTML = r;
  }

  window.SG = {
    set: function(i) { cur=i; editing=false; aligns=SCENARIOS[i].a.slice(); selL=null; render(); },
    te: function() { editing=!editing; render(); },
    sl: function(i) { selL=selL===i?null:i; render(); },
    sd: function(i,v) { aligns[i]=parseInt(v)/100; render(); }
  };

  render();
})();
</script>
