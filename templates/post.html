<!-- ═══ ARTICLE ═══ -->
<div class="article-wrap">
  <a href="/" class="back-link">← Back to Feed</a>

  <article>
    <header class="article-header">
      <span class="pub-tag {{tagClass}}">{{tag}}</span>
      <h1>{{title}}</h1>
      <div class="article-meta">
        <span>{{drk}}</span>
        <span>{{date}}</span>
        <span>{{author}}</span>
        <span>Layers: {{layers}}</span>
        <span>Coherence: {{coherence}}</span>
      </div>
    </header>

    <div class="article-body">
      {{body}}
    </div>
  </article>

  <div style="margin-top:48px; padding-top:24px; border-top:1px solid var(--border);">
    <a href="/" class="back-link">← Back to Feed</a>
  </div>
</div>
